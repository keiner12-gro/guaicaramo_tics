<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="public/css/styles.css">
    <title>Guaicaramo SAS</title>
</head>
<body>
    <div class="contenedor menu-contenedor w-full max-w-sm bg-neutral-primary-soft p-6 border border-default rounded-base shadow-xs">
        <div class="titulo-principal">
            <h1>GUAICARAMO SAS</h1>
            <p>AREA TICS</p>
        </div>

        <div class="flex flex-col gap-4 w-full">
            <div class="menu-desplegable w-full">
                <button type="button" id="btn-bodega" class="boton-menu">Bodega</button>
                <div id="opciones-bodega" class="opciones-menu w-full">
                    <a href="public/views/registro.html">Registrar Elemento</a>
                    <a href="public/views/consultar_pro.html">Consultar Elementos</a>
                    <a href="public/views/eliminar_pro.html">Eliminar Elementos</a>
                </div>
            </div>

            <div class="menu-desplegable w-full">
                <button type="button" id="btn-equipos" class="boton-menu" style="background: linear-gradient(135deg, #14b8a6, #2563eb);">Equipos</button>
                <div id="opciones-equipos" class="opciones-menu w-full">
                    <a href="public/views/registro_equipo.html">Registrar Equipo (Excel/OCR)</a>
                    <a href="public/views/consultar_equipo.html">Consultar Equipos</a>
                    <a href="public/views/eliminar_equipo.html">Eliminar Equipos</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btnBodega = document.getElementById('btn-bodega');
        const btnEquipos = document.getElementById('btn-equipos');
        const opcionesBodega = document.getElementById('opciones-bodega');
        const opcionesEquipos = document.getElementById('opciones-equipos');

        btnBodega.addEventListener('click', function(e) {
            e.stopPropagation();
            opcionesEquipos.classList.remove('mostrar');
            opcionesBodega.classList.toggle('mostrar');
        });

        btnEquipos.addEventListener('click', function(e) {
            e.stopPropagation();
            opcionesBodega.classList.remove('mostrar');
            opcionesEquipos.classList.toggle('mostrar');
        });

        window.addEventListener('click', function(e) {
            if (!opcionesBodega.contains(e.target) && e.target !== btnBodega) {
                opcionesBodega.classList.remove('mostrar');
            }
            if (!opcionesEquipos.contains(e.target) && e.target !== btnEquipos) {
                opcionesEquipos.classList.remove('mostrar');
            }
        });
    </script>
</body>
</html>
