<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <title>Inventario de Equipos | Guaicaramo</title>
</head>
<body>
    <div class="contenedor-wide animate__animated animate__fadeIn">
        <div class="consulta-header flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 border-b pb-6">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-secondary rounded-xl text-white shadow-lg">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-bg-dark tracking-tight">Inventario de Equipos</h1>
                    <p class="text-primary font-bold">Control Total de Activos Tecnológicos</p>
                </div>
            </div>
            
            <a href="../../index.html" class="boton-regresar-modern">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Menu Principal
            </a>
        </div>

        <div class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-8">
            <form id="form-busqueda-equipo" class="w-full lg:max-w-2xl">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <svg class="w-5 h-5 text-text-muted group-focus-within:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="busqueda-equipo" class="pl-12 py-4 bg-white/50 border-2 border-transparent focus:border-primary focus:bg-white transition-all shadow-sm w-full rounded-2xl" placeholder="Buscar por marca, modelo, placa, usuario, serial...">
                </div>
            </form>

            <div class="flex items-center gap-4 w-full lg:w-auto">
                <div id="contador-equipos" class="px-4 py-2 bg-primary/10 text-primary font-bold rounded-xl text-sm whitespace-nowrap">
                    Calculando...
                </div>
                <div class="flex items-center gap-4">
                    <button id="eliminar-todos-equipos" class="flex items-center justify-center py-3 px-6 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-lg shadow-red-600/20 transition-all">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Eliminar Todo
                    </button>
                    <button id="exportar-equipos-excel" class="btn-excel w-full lg:w-auto py-3 px-6 shadow-lg shadow-green-500/20">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm5 6a1 1 0 10-2 0v3.586l-1.293-1.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V8z" clip-rule="evenodd"></path></svg>
                        Reporte Excel
                    </button>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-center gap-4 mb-8">
            <button id="prev-equipo" class="btn-nav-modern" disabled>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div id="equipo-index-display"></div>
            <button id="next-equipo" class="btn-nav-modern" disabled>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <div id="equipo-detalle-container" class="flex justify-center items-center min-h-[300px]">
            <div class="col-span-full py-20 text-center text-gray-500 font-bold bg-white/50 rounded-2xl w-full max-w-md">Cargando equipos...</div>
        </div>

        <!-- Modal de Edición Equipo -->
        <div id="modal-edicion-equipo" class="modal-edicion">
            <div class="modal-content shadow-2xl">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h2 class="text-2xl font-extrabold text-bg-dark">Editar Equipo</h2>
                    <button onclick="cerrarModalEquipo()" class="text-text-muted hover:text-danger transition-colors">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <form id="form-edicion-equipo" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="hidden" id="edit-equipo-id">
                    <div>
                        <label>Marca</label>
                        <input type="text" id="edit-equipo-marca" required>
                    </div>
                    <div>
                        <label>Modelo</label>
                        <input type="text" id="edit-equipo-modelo" required>
                    </div>
                    <div>
                        <label>Estado</label>
                        <select id="edit-equipo-estado">
                            <option value="Nuevo">Nuevo</option>
                            <option value="Usado">Usado</option>
                            <option value="Mantenimiento">Mantenimiento</option>
                            <option value="Reparación">Reparación</option>
                        </select>
                    </div>
                    <div>
                        <label>Nombre Equipo</label>
                        <input type="text" id="edit-equipo-nombre">
                    </div>
                    <div>
                        <label>Placa TICS</label>
                        <input type="text" id="edit-equipo-placa">
                    </div>
                    <div>
                        <label>S.O.</label>
                        <input type="text" id="edit-equipo-so">
                    </div>
                    <div>
                        <label>Ubicación</label>
                        <input type="text" id="edit-equipo-ubicacion">
                    </div>
                    <div>
                        <label>Responsable</label>
                        <input type="text" id="edit-equipo-usuario">
                    </div>
                    <div>
                        <label>Serial</label>
                        <input type="text" id="edit-equipo-serial">
                    </div>
                    <div>
                        <label>AnyDesk</label>
                        <input type="text" id="edit-equipo-anydesk">
                    </div>
                    <div>
                        <label>E-mail</label>
                        <input type="email" id="edit-equipo-correo">
                    </div>
                    <div>
                        <label>Identificación (CC)</label>
                        <input type="text" id="edit-equipo-cedula">
                    </div>
                    <div>
                        <label>Fecha Compra</label>
                        <input type="date" id="edit-equipo-compra">
                    </div>
                    <div>
                        <label>Manto. Ant.</label>
                        <input type="date" id="edit-equipo-manto-ant">
                    </div>
                    <div>
                        <label>Próx. Manto.</label>
                        <input type="date" id="edit-equipo-manto-prox">
                    </div>
                    <div class="md:col-span-2 flex justify-end gap-4 mt-4">
                        <button type="button" onclick="cerrarModalEquipo()" class="px-6 py-3 border-2 border-gray-200 rounded-xl font-bold hover:bg-gray-50 transition-all">Cancelar</button>
                        <button type="submit" class="px-8 py-3 bg-secondary text-white rounded-xl font-bold shadow-lg shadow-secondary/20 hover:scale-105 transition-all">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/scripts.js" defer></script>
</body>
</html>
