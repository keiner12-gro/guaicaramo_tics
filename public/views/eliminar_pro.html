<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <title>Baja de Elementos | Guaicaramo</title>
</head>
<body>
    <div class="contenedor-wide animate__animated animate__fadeIn">
        <div class="consulta-header flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8 border-b pb-6">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-danger rounded-xl text-white shadow-lg">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-bg-dark tracking-tight">Dar de Baja Elementos</h1>
                    <p class="text-danger font-bold">Eliminar items del Inventario de Bodega</p>
                </div>
            </div>
            
            <a href="../../index.html" class="boton-regresar-modern">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Menu Principal
            </a>
        </div>

        <div class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-8">
            <form id="form" class="w-full lg:max-w-2xl">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <svg class="w-5 h-5 text-text-muted group-focus-within:text-danger transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="dato1" class="pl-12 py-4 bg-white/50 border-2 border-transparent focus:border-danger focus:bg-white transition-all shadow-sm w-full rounded-2xl" placeholder="Filtrar por descripción, marca, serial...">
                </div>
            </form>
        </div>

        <div class="tabla-contenedor-modern animate__animated animate__fadeInUp shadow-2xl">
            <table id="tabla-elementos-eliminar" class="tabla-modern">
                <thead>
                    <tr class="bg-slate-50">
                        <th>Cantidad</th>
                        <th>Modelo</th>
                        <th>Marca</th>
                        <th>Serial</th>
                        <th>Placa</th>
                        <th>Descripción</th>
                        <th>Ingreso</th>
                        <th>Baja</th>
                        <th class="text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="elementos-body" class="bg-white">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/scripts.js" defer></script>
</body>
</html>
